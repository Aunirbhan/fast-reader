<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a0a">
<link rel="manifest" href="manifest.json">
<title>FlashRead</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --fg: #f0f0f0;
    --dim: #888;
    --accent: #e63946;
    --surface: #1a1a1a;
    --border: #2a2a2a;
  }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* ── LIBRARY ── */
  #library {
    display: flex;
    flex-direction: column;
    min-height: 100dvh;
    padding: 24px 16px;
    max-width: 680px;
    margin: 0 auto;
    width: 100%;
  }

  #library h1 {
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 20px;
    color: var(--fg);
  }

  #book-list {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .book-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .book-item:hover { background: #222; }

  .book-info { flex: 1; min-width: 0; }
  .book-title {
    font-size: 0.95rem;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .book-meta { font-size: 0.75rem; color: var(--dim); margin-top: 3px; }

  .book-delete {
    background: none;
    border: none;
    color: var(--dim);
    font-size: 1.1rem;
    cursor: pointer;
    padding: 6px;
    line-height: 1;
    border-radius: 6px;
    transition: color 0.15s;
    flex-shrink: 0;
  }
  .book-delete:hover { color: var(--accent); }

  #upload-area {
    margin-top: 20px;
  }

  #upload-btn {
    width: 100%;
    background: var(--surface);
    border: 1px dashed var(--border);
    border-radius: 10px;
    color: var(--fg);
    font-size: 0.95rem;
    padding: 16px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  #upload-btn:hover { border-color: #555; background: #181818; }

  #file-input { display: none; }

  #empty-msg {
    color: var(--dim);
    font-size: 0.9rem;
    text-align: center;
    padding: 40px 0;
  }

  /* ── READER ── */
  #reader {
    display: none;
    flex-direction: column;
    min-height: 100dvh;
  }

  #reader-header {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    gap: 12px;
    flex-shrink: 0;
  }

  #back-btn {
    background: none;
    border: none;
    color: var(--fg);
    font-size: 1.3rem;
    cursor: pointer;
    padding: 4px 8px;
    line-height: 1;
  }

  #reader-title {
    font-size: 0.9rem;
    color: var(--dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }

  #page-indicator {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--dim);
    font-size: 0.75rem;
    padding: 4px 8px;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    transition: border-color 0.15s, color 0.15s;
    font-variant-numeric: tabular-nums;
  }
  #page-indicator:hover { border-color: #555; color: var(--fg); }
  #page-indicator.active { border-color: var(--accent); color: var(--accent); }

  /* RSVP display */
  #rsvp-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    position: relative;
    user-select: none;
    touch-action: manipulation;
  }

  #rsvp-display {
    display: flex;
    align-items: baseline;
    width: 100%;
    font-size: clamp(2rem, 8vw, 5rem);
    font-weight: 500;
    letter-spacing: -0.01em;
    line-height: 1.1;
  }

  #word-pre {
    text-align: right;
    width: 45vw;
    flex-shrink: 0;
    color: var(--fg);
  }

  #word-pivot {
    color: var(--accent);
    font-weight: 700;
    flex-shrink: 0;
  }

  #word-post {
    text-align: left;
    width: 45vw;
    flex-shrink: 0;
    color: var(--fg);
  }

  /* Tap zones (invisible) — only shown in RSVP mode */
  #tap-left, #tap-right, #tap-center {
    position: absolute;
    top: 0; height: 100%;
  }
  #tap-left   { left: 0;    width: 30%; }
  #tap-center { left: 30%;  width: 40%; }
  #tap-right  { right: 0;   width: 30%; }

  /* Page mode */
  #page-area {
    display: none;
    flex: 1;
    overflow-y: auto;
    padding: 20px 20px;
    line-height: 1.75;
    font-size: clamp(0.95rem, 2.5vw, 1.15rem);
    word-break: break-word;
  }
  #page-area .pw {
    display: inline;
    cursor: pointer;
    border-radius: 3px;
    padding: 0 1px;
    transition: background 0.05s;
  }
  #page-area .pw:hover { background: #2a2a2a; }
  #page-area .pw.current {
    background: var(--accent);
    color: #fff;
    border-radius: 3px;
  }
  #page-nav {
    display: none;
    gap: 8px;
    padding: 0 20px 12px;
    flex-shrink: 0;
  }
  #page-nav button {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--fg);
    font-size: 0.85rem;
    padding: 8px;
    cursor: pointer;
  }
  #page-nav button:hover { background: #222; }
  #page-nav button:disabled { opacity: 0.3; cursor: default; }

  /* Controls */
  #reader-controls {
    padding: 16px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 14px;
    flex-shrink: 0;
  }

  #play-pause-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--fg);
    font-size: 1.6rem;
    padding: 10px;
    cursor: pointer;
    width: 100%;
    transition: background 0.15s;
  }
  #play-pause-btn:hover { background: #222; }

  #wpm-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  #wpm-label {
    font-size: 0.8rem;
    color: var(--dim);
    white-space: nowrap;
    min-width: 64px;
  }

  #wpm-slider {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  #wpm-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 28px;
    height: 28px;
    background: var(--fg);
    border-radius: 50%;
    cursor: pointer;
  }
  #wpm-slider::-moz-range-thumb {
    width: 28px;
    height: 28px;
    background: var(--fg);
    border-radius: 50%;
    cursor: pointer;
    border: none;
  }

  #progress-text {
    font-size: 0.75rem;
    color: var(--dim);
    text-align: center;
  }

  /* Loading overlay */
  #loading {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,10,10,0.9);
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
    z-index: 999;
  }
  #loading.visible { display: flex; }
  #loading p { color: var(--dim); font-size: 0.9rem; }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--fg);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- LIBRARY VIEW -->
<div id="library">
  <h1>FlashRead</h1>
  <div id="book-list"><p id="empty-msg">No books yet. Upload an EPUB or PDF to get started.</p></div>
  <div id="upload-area">
    <button id="upload-btn" onclick="document.getElementById('file-input').click()">+ Upload EPUB or PDF</button>
    <input type="file" id="file-input" accept=".epub,.pdf">
  </div>
</div>

<!-- READER VIEW -->
<div id="reader">
  <div id="reader-header">
    <button id="back-btn" onclick="showLibrary()">←</button>
    <div id="reader-title"></div>
    <button id="page-indicator" onclick="togglePageMode()">p.– / –</button>
  </div>
  <div id="rsvp-area">
    <div id="rsvp-display">
      <div id="word-pre"></div>
      <div id="word-pivot"></div>
      <div id="word-post"></div>
    </div>
    <div id="tap-left"></div>
    <div id="tap-center"></div>
    <div id="tap-right"></div>
  </div>
  <div id="page-area"></div>
  <div id="page-nav">
    <button id="page-prev-btn" onclick="jumpPage(-1)">← Prev page</button>
    <button id="page-next-btn" onclick="jumpPage(1)">Next page →</button>
  </div>
  <div id="reader-controls">
    <button id="play-pause-btn" onclick="togglePlay()">▶</button>
    <div id="wpm-row">
      <span id="wpm-label">250 WPM</span>
      <input type="range" id="wpm-slider" min="100" max="1000" value="250" step="10">
    </div>
    <div id="progress-text">–</div>
  </div>
</div>

<!-- LOADING -->
<div id="loading"><div class="spinner"></div><p id="loading-msg">Parsing…</p></div>

<!-- CDN scripts -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
'use strict';

// ── PDF.js worker ──
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── IndexedDB ──
let db;

function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open('flashread', 1);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('books'))
        d.createObjectStore('books', { keyPath: 'id' });
      if (!d.objectStoreNames.contains('words'))
        d.createObjectStore('words', { keyPath: 'bookId' });
      if (!d.objectStoreNames.contains('progress'))
        d.createObjectStore('progress', { keyPath: 'bookId' });
    };
    req.onsuccess = e => res(e.target.result);
    req.onerror = e => rej(e.target.error);
  });
}

function dbPut(store, value) {
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).put(value);
    req.onsuccess = () => res();
    req.onerror = e => rej(e.target.error);
  });
}

function dbGet(store, key) {
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).get(key);
    req.onsuccess = e => res(e.target.result);
    req.onerror = e => rej(e.target.error);
  });
}

function dbGetAll(store) {
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).getAll();
    req.onsuccess = e => res(e.target.result);
    req.onerror = e => rej(e.target.error);
  });
}

function dbDelete(store, key) {
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).delete(key);
    req.onsuccess = () => res();
    req.onerror = e => rej(e.target.error);
  });
}

// ── Hashing ──
function hashStr(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) {
    h = Math.imul(31, h) + s.charCodeAt(i) | 0;
  }
  return Math.abs(h).toString(16);
}

// ── Parse ──
async function parsePDF(file) {
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
  const words = [];
  for (let p = 1; p <= pdf.numPages; p++) {
    setLoading(true, `Parsing page ${p} / ${pdf.numPages}…`);
    const page = await pdf.getPage(p);
    const content = await page.getTextContent();
    const text = content.items.map(i => i.str).join(' ');
    words.push(...text.split(/\s+/).filter(Boolean));
  }
  return words;
}

async function parseEPUB(file) {
  const buf = await file.arrayBuffer();
  const zip = await JSZip.loadAsync(buf);

  // Find container.xml → rootfile
  const containerXml = await zip.file('META-INF/container.xml').async('string');
  const rootfilePath = containerXml.match(/full-path="([^"]+)"/)?.[1];
  if (!rootfilePath) throw new Error('No rootfile in EPUB container');

  const opfText = await zip.file(rootfilePath).async('string');
  const opfBase = rootfilePath.includes('/') ? rootfilePath.split('/').slice(0, -1).join('/') + '/' : '';

  // Parse spine item order
  const parser = new DOMParser();
  const opfDoc = parser.parseFromString(opfText, 'application/xml');

  const manifestItems = {};
  opfDoc.querySelectorAll('manifest item').forEach(item => {
    manifestItems[item.getAttribute('id')] = item.getAttribute('href');
  });

  const spineOrder = [];
  opfDoc.querySelectorAll('spine itemref').forEach(ref => {
    const href = manifestItems[ref.getAttribute('idref')];
    if (href) spineOrder.push(href);
  });

  const words = [];
  for (let si = 0; si < spineOrder.length; si++) {
    const href = spineOrder[si];
    setLoading(true, `Parsing chapter ${si + 1} / ${spineOrder.length}…`);

    // Resolve path: strip leading slash for absolute paths, then try opfBase-relative
    const stripped = href.replace(/^\//, '');
    const candidates = [
      opfBase + stripped,
      stripped,
      opfBase + href,
      href,
    ];
    let fileObj = null;
    for (const candidate of candidates) {
      fileObj = zip.file(candidate);
      if (fileObj) break;
    }
    if (!fileObj) continue;
    const html = await fileObj.async('string');
    const doc = parser.parseFromString(html, 'application/xhtml+xml');
    const text = doc.body ? doc.body.textContent : doc.textContent;
    words.push(...text.split(/\s+/).filter(Boolean));
  }
  return words;
}

// ── ORP pivot index ──
function pivotIndex(word) {
  const len = word.length;
  if (len <= 3) return 0;
  if (len <= 6) return 1;
  if (len <= 9) return 2;
  return 3;
}

function splitWord(word) {
  const idx = pivotIndex(word);
  return {
    pre: word.slice(0, idx),
    pivot: word[idx] || '',
    post: word.slice(idx + 1)
  };
}

// ── RSVP state ──
let words = [];
let currentIndex = 0;
let playing = false;
let wpm = 250;
let tickTimeout = null;
let expected = 0;
let currentBookId = null;
let saveCounter = 0;
const PAGE_SIZE = 200;
let pageMode = false;

// ── Page helpers ──
function currentPage(idx) { return Math.floor(idx / PAGE_SIZE); }
function totalPages() { return Math.ceil(words.length / PAGE_SIZE); }
function pageStart(page) { return page * PAGE_SIZE; }
function pageEnd(page) { return Math.min((page + 1) * PAGE_SIZE, words.length); }

function updatePageIndicator(idx) {
  const pg = currentPage(idx);
  const total = totalPages();
  const btn = document.getElementById('page-indicator');
  btn.textContent = `p.${pg + 1} / ${total}`;
}

// ── RSVP display ──
function showWord(idx) {
  if (idx < 0 || idx >= words.length) return;

  updatePageIndicator(idx);
  document.getElementById('progress-text').textContent =
    `word ${idx + 1} / ${words.length} (${Math.round((idx + 1) / words.length * 100)}%)`;

  if (pageMode) {
    updatePageHighlight(idx);
    return;
  }

  const { pre, pivot, post } = splitWord(words[idx]);
  document.getElementById('word-pre').textContent = pre;
  document.getElementById('word-pivot').textContent = pivot;
  document.getElementById('word-post').textContent = post;
}

// ── Page mode ──
let renderedPage = -1;

function renderPageView(page) {
  const area = document.getElementById('page-area');
  const start = pageStart(page);
  const end = pageEnd(page);
  const frag = document.createDocumentFragment();

  for (let i = start; i < end; i++) {
    const span = document.createElement('span');
    span.className = 'pw';
    span.dataset.i = i;
    span.textContent = words[i];
    span.addEventListener('click', () => {
      currentIndex = i;
      showWord(currentIndex);
      if (playing) {
        clearTimeout(tickTimeout);
        expected = performance.now();
        tickTimeout = setTimeout(tick, 60000 / wpm);
      }
    });
    frag.appendChild(span);
    if (i < end - 1) frag.appendChild(document.createTextNode(' '));
  }

  area.innerHTML = '';
  area.appendChild(frag);
  renderedPage = page;

  // Update prev/next buttons
  document.getElementById('page-prev-btn').disabled = page === 0;
  document.getElementById('page-next-btn').disabled = page >= totalPages() - 1;
}

function updatePageHighlight(idx) {
  const pg = currentPage(idx);

  // Re-render if page changed
  if (pg !== renderedPage) {
    renderPageView(pg);
  }

  // Clear previous highlight
  const prev = document.querySelector('#page-area .pw.current');
  if (prev) prev.classList.remove('current');

  // Highlight current
  const span = document.querySelector(`#page-area .pw[data-i="${idx}"]`);
  if (span) {
    span.classList.add('current');
    span.scrollIntoView({ block: 'center', behavior: 'smooth' });
  }
}

function jumpPage(delta) {
  const pg = currentPage(currentIndex) + delta;
  if (pg < 0 || pg >= totalPages()) return;
  currentIndex = pageStart(pg);
  renderPageView(pg);
  updatePageHighlight(currentIndex);
  updatePageIndicator(currentIndex);
  if (playing) {
    clearTimeout(tickTimeout);
    expected = performance.now();
    tickTimeout = setTimeout(tick, 60000 / wpm);
  }
}

function togglePageMode() {
  pageMode = !pageMode;
  const rsvp = document.getElementById('rsvp-area');
  const pageArea = document.getElementById('page-area');
  const pageNav = document.getElementById('page-nav');
  const btn = document.getElementById('page-indicator');

  if (pageMode) {
    rsvp.style.display = 'none';
    pageArea.style.display = 'block';
    pageNav.style.display = 'flex';
    btn.classList.add('active');
    renderedPage = -1;
    updatePageHighlight(currentIndex);
  } else {
    rsvp.style.display = 'flex';
    pageArea.style.display = 'none';
    pageNav.style.display = 'none';
    btn.classList.remove('active');
    const { pre, pivot, post } = splitWord(words[currentIndex] || '');
    document.getElementById('word-pre').textContent = pre;
    document.getElementById('word-pivot').textContent = pivot;
    document.getElementById('word-post').textContent = post;
  }
}

function saveProgress() {
  saveCounter++;
  if (saveCounter % 10 === 0 && currentBookId) {
    dbPut('progress', { bookId: currentBookId, currentIndex });
  }
}

function flushProgress() {
  if (currentBookId) {
    dbPut('progress', { bookId: currentBookId, currentIndex });
  }
}

// ── Tick ──
function tick() {
  if (!playing) return;
  showWord(currentIndex);
  saveProgress();
  currentIndex++;
  if (currentIndex >= words.length) {
    playing = false;
    document.getElementById('play-pause-btn').textContent = '▶';
    flushProgress();
    // Offer restart
    if (confirm('You reached the end! Restart from the beginning?')) {
      currentIndex = 0;
      showWord(currentIndex);
      flushProgress();
    }
    return;
  }
  const intervalMs = 60000 / wpm;
  expected += intervalMs;
  const drift = performance.now() - expected;
  tickTimeout = setTimeout(tick, Math.max(0, intervalMs - drift));
}

function startTick() {
  clearTimeout(tickTimeout);
  const intervalMs = 60000 / wpm;
  expected = performance.now();
  tickTimeout = setTimeout(tick, intervalMs);
}

function togglePlay() {
  playing = !playing;
  document.getElementById('play-pause-btn').textContent = playing ? '⏸' : '▶';
  if (playing) startTick();
  else {
    clearTimeout(tickTimeout);
    flushProgress();
  }
}

// ── WPM slider ──
const slider = document.getElementById('wpm-slider');
slider.addEventListener('input', () => {
  wpm = parseInt(slider.value);
  document.getElementById('wpm-label').textContent = wpm + ' WPM';
  if (playing) {
    clearTimeout(tickTimeout);
    const intervalMs = 60000 / wpm;
    expected = performance.now();
    tickTimeout = setTimeout(tick, intervalMs);
  }
});

// ── Keyboard ──
document.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    const reader = document.getElementById('reader');
    if (reader.style.display !== 'none') {
      e.preventDefault();
      togglePlay();
    }
  }
});

// ── Tap zones ──
document.getElementById('tap-left').addEventListener('click', () => {
  if (currentIndex > 0) {
    currentIndex--;
    showWord(currentIndex);
    if (playing) {
      clearTimeout(tickTimeout);
      expected = performance.now();
      tickTimeout = setTimeout(tick, 60000 / wpm);
    }
  }
});
document.getElementById('tap-right').addEventListener('click', () => {
  if (!playing && currentIndex < words.length - 1) {
    currentIndex++;
    showWord(currentIndex);
  }
});
document.getElementById('tap-center').addEventListener('click', togglePlay);

// ── Views ──
function showLibrary() {
  clearTimeout(tickTimeout);
  playing = false;
  pageMode = false;
  flushProgress();
  words = [];
  currentBookId = null;
  document.getElementById('reader').style.display = 'none';
  document.getElementById('library').style.display = 'flex';
  renderLibrary();
}

function showReader(bookId, bookName, bookWords, startIdx) {
  words = bookWords;
  currentIndex = startIdx || 0;
  currentBookId = bookId;
  playing = false;
  pageMode = false;
  renderedPage = -1;
  document.getElementById('play-pause-btn').textContent = '▶';
  document.getElementById('reader-title').textContent = bookName;
  // Ensure RSVP visible, page area hidden
  document.getElementById('rsvp-area').style.display = 'flex';
  document.getElementById('page-area').style.display = 'none';
  document.getElementById('page-nav').style.display = 'none';
  document.getElementById('page-indicator').classList.remove('active');
  document.getElementById('library').style.display = 'none';
  document.getElementById('reader').style.display = 'flex';
  showWord(currentIndex);
}

// ── Library ──
async function renderLibrary() {
  const books = await dbGetAll('books');
  const list = document.getElementById('book-list');

  if (books.length === 0) {
    list.innerHTML = '<p id="empty-msg">No books yet. Upload an EPUB or PDF to get started.</p>';
    return;
  }

  list.innerHTML = '';
  books.sort((a, b) => b.addedAt - a.addedAt).forEach(book => {
    const item = document.createElement('div');
    item.className = 'book-item';

    const info = document.createElement('div');
    info.className = 'book-info';

    const title = document.createElement('div');
    title.className = 'book-title';
    title.textContent = book.name;

    const meta = document.createElement('div');
    meta.className = 'book-meta';

    dbGet('progress', book.id).then(prog => {
      const idx = prog ? prog.currentIndex : 0;
      const pct = Math.round(idx / book.wordCount * 100);
      meta.textContent = `${book.wordCount.toLocaleString()} words · ${pct}%`;
    });

    info.appendChild(title);
    info.appendChild(meta);

    const del = document.createElement('button');
    del.className = 'book-delete';
    del.textContent = '✕';
    del.title = 'Delete';
    del.onclick = async e => {
      e.stopPropagation();
      await dbDelete('books', book.id);
      await dbDelete('words', book.id);
      await dbDelete('progress', book.id);
      renderLibrary();
    };

    item.appendChild(info);
    item.appendChild(del);
    item.onclick = async () => {
      setLoading(true, 'Loading…');
      const wordData = await dbGet('words', book.id);
      const prog = await dbGet('progress', book.id);
      setLoading(false);
      showReader(book.id, book.name, wordData.words, prog ? prog.currentIndex : 0);
    };

    list.appendChild(item);
  });
}

// ── Upload ──
document.getElementById('file-input').addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file) return;
  e.target.value = '';

  setLoading(true, 'Parsing…');
  try {
    let parsed;
    if (file.name.toLowerCase().endsWith('.pdf')) {
      parsed = await parsePDF(file);
    } else if (file.name.toLowerCase().endsWith('.epub')) {
      parsed = await parseEPUB(file);
    } else {
      alert('Only EPUB and PDF files are supported.');
      setLoading(false);
      return;
    }

    if (parsed.length === 0) throw new Error('No text found in file.');

    const id = hashStr(file.name + file.size);
    const book = { id, name: file.name.replace(/\.(epub|pdf)$/i, ''), wordCount: parsed.length, addedAt: Date.now() };
    await dbPut('books', book);
    await dbPut('words', { bookId: id, words: parsed });

    setLoading(false);
    showReader(id, book.name, parsed, 0);
  } catch (err) {
    setLoading(false);
    alert('Failed to parse file: ' + err.message);
    console.error(err);
  }
});

// ── Loading ──
function setLoading(visible, msg) {
  const el = document.getElementById('loading');
  el.classList.toggle('visible', visible);
  if (msg) document.getElementById('loading-msg').textContent = msg;
}

// ── Init ──
async function init() {
  db = await openDB();
  await renderLibrary();

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(console.warn);
  }
}

init();
</script>
