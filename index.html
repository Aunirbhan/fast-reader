<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0b0b0d">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="styles.css">
<title>FlashRead</title>
</head>
<body>

<!-- LIBRARY VIEW -->
<div id="library">
  <h1>FlashRead</h1>
  <p id="library-subtitle">Gotham Speed Reader</p>
  <div id="book-list">
    <p id="empty-msg">No dossiers loaded. Upload an EPUB or PDF to begin.</p>
  </div>
  <div id="upload-area">
    <button id="upload-btn" onclick="document.getElementById('file-input').click()">+ Upload EPUB or PDF</button>
    <input type="file" id="file-input" accept=".epub,.pdf">
  </div>
</div>

<!-- READER VIEW -->
<div id="reader">
  <div id="reader-header">
    <button id="back-btn" onclick="showLibrary()">← Back</button>
    <div id="reader-title"></div>
    <button id="page-indicator" onclick="togglePageMode()">p.– / –</button>
  </div>
  <div id="rsvp-area">
    <div id="rsvp-display">
      <div id="word-pre"></div>
      <div id="word-pivot"></div>
      <div id="word-post"></div>
    </div>
    <div id="tap-left"></div>
    <div id="tap-center"></div>
    <div id="tap-right"></div>
  </div>
  <div id="page-area"></div>
  <div id="page-nav">
    <button id="page-prev-btn" onclick="jumpPage(-1)">← Prev</button>
    <button id="page-next-btn" onclick="jumpPage(1)">Next →</button>
  </div>
  <div id="reader-controls">
    <button id="play-pause-btn" onclick="togglePlay()">▶</button>
    <div id="wpm-row">
      <span id="wpm-label">250 WPM</span>
      <input type="range" id="wpm-slider" min="100" max="1000" value="250" step="10">
    </div>
    <div id="progress-text">–</div>
  </div>
</div>

<!-- LOADING -->
<div id="loading">
  <div class="spinner"></div>
  <p id="loading-msg">Parsing…</p>
</div>

<!-- CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="app.js"></script>
</body>
</html>
